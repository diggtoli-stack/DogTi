<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DogTI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --black: #111111;
    --gray-1: #f5f5f5;
    --gray-2: #e8e8e8;
    --gray-3: #aaaaaa;
    --white: #ffffff;
    --font: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
  }

  body {
    background: var(--white);
    color: var(--black);
    font-family: var(--font);
    min-height: 100vh;
    max-width: 390px;
    margin: 0 auto;
    overflow-x: hidden;
  }

  /* ─── 封面页 ─── */
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  .page { display: none; }
  .page.active { display: flex; flex-direction: column; }

  #page-home {
    min-height: 100vh;
    background: #fff;
    overflow: hidden;
    position: relative;
    padding-top: 10px;
  }

  /* 像素大标题 */
  .home-pixel-title {
    /* font-family: 'Press Start 2P', monospace; */
    /* font-size: 52px; */
    /* color: #111; */
    text-align: center;
    padding: 14px 0 0;
    /* letter-spacing: 4px; */
    line-height: 1;
    position: relative;
    z-index: 2;
    /* -webkit-text-stroke: 3px #111; */
    /* paint-order: stroke fill; */
  }

  /* 动物滚动区域 */
  .animals-stage {
    width: 100%;
    overflow: hidden;
    padding: 12px 0 0;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .animals-row {
    display: flex;
    gap: 0;
    width: max-content;
  }

  .animals-row.row-1 { animation: scroll-left 18s linear infinite; }
  .animals-row.row-2 { animation: scroll-right 22s linear infinite; }
  .animals-row.row-3 { animation: scroll-left 16s linear infinite; }

  @keyframes scroll-left {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  @keyframes scroll-right {
    0%   { transform: translateX(-50%); }
    100% { transform: translateX(0); }
  }

  .animal-cell {
    width: 108px;
    height: 108px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  /* 底部文字+按钮区 */
  .home-bottom {
    padding: 36px 28px 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    z-index: 2;
  }

  .home-main-title {
    font-size: 24px;
    font-weight: 900;
    color: #111;
    text-align: center;
    margin-bottom: 12px;
    letter-spacing: -0.5px;
  }

  .home-tagline {
    font-size: 13px;
    color: #999;
    font-style: italic;
    text-align: center;
    margin-bottom: 36px;
  }

  /* 开始按钮 */
  .btn-start {
    width: 100%;
    max-width: 340px;
    height: 64px;
    background: #111;
    color: #fff;
    border: none;
    border-radius: 100px;
    font-size: 17px;
    font-weight: 700;
    font-family: var(--font);
    cursor: pointer;
    letter-spacing: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    transition: opacity 0.15s;
    box-shadow: none;
  }

  .btn-start:active { opacity: 0.75; }

  .btn-start-icon {
    width: 26px;
    height: 26px;
    border: 2.5px solid #fff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .btn-start-icon::after {
    content: '';
    border-left: 9px solid #fff;
    border-top: 5px solid transparent;
    border-bottom: 5px solid transparent;
    margin-left: 2px;
  }

  /* ─── 题目页 ─── */
  #page-quiz {
    min-height: 100vh;
    padding-bottom: 40px;
  }

  .quiz-header {
    padding: 14px 20px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .btn-back {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--gray-1);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 16px;
    color: var(--black);
  }

  .quiz-counter {
    font-size: 13px;
    color: var(--gray-3);
    font-weight: 500;
  }

  /* 进度条 */
  .progress-wrap {
    padding: 16px 20px 0;
  }

  .progress-track {
    height: 3px;
    background: var(--gray-2);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--black);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* 题目区 */
  .quiz-body {
    padding: 32px 24px 0;
  }

  /* 像素狗插图 */
  .quiz-dog-wrap {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 24px;
  }

  .quiz-dog-icon {
    width: 56px;
    height: 56px;
    background: var(--gray-1);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .quiz-dog-bubble {
    background: var(--gray-1);
    border-radius: 12px 12px 12px 4px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--gray-3);
    line-height: 1.6;
    flex: 1;
  }

  .question-text {
    font-size: 20px;
    font-weight: 700;
    line-height: 1.45;
    letter-spacing: -0.3px;
    margin-bottom: 28px;
  }

  /* 选项 */
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .opt {
    padding: 16px 18px;
    border: 1.5px solid var(--gray-2);
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.5;
    color: var(--black);
    background: var(--white);
    cursor: pointer;
    text-align: left;
    font-family: var(--font);
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: all 0.15s;
    -webkit-appearance: none;
  }

  .opt-key {
    font-size: 11px;
    color: var(--gray-3);
    font-weight: 600;
    min-width: 14px;
    margin-top: 1px;
  }

  .opt:active, .opt.selected {
    background: var(--black);
    border-color: var(--black);
    color: var(--white);
  }

  .opt.selected .opt-key {
    color: rgba(255,255,255,0.5);
  }

  /* 下一题按钮 */
  .btn-next {
    margin: 28px 24px 0;
    width: calc(100% - 48px);
    height: 52px;
    background: var(--black);
    color: var(--white);
    border: none;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 600;
    font-family: var(--font);
    cursor: pointer;
    transition: opacity 0.15s;
    opacity: 0.25;
    pointer-events: none;
  }

  .btn-next.enabled {
    opacity: 1;
    pointer-events: all;
  }

  .btn-next.enabled:active { opacity: 0.75; }

  /* ─── 结果页 ─── */
  #page-result {
    min-height: 100vh;
    padding-bottom: 60px;
  }

  .result-header {
    padding: 14px 20px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    color: var(--gray-3);
  }

  .result-hero {
    padding: 40px 28px 34px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .result-dog-frame {
    width: 144px;
    height: 144px;
    background: var(--gray-1);
    border-radius: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
  }

  .result-label {
    font-size: 12px;
    color: var(--gray-3);
    font-weight: 500;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }

  .result-type {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 6px;
    text-align: center;
  }

  .result-subname {
    font-size: 14px;
    color: var(--gray-3);
    text-align: center;
    margin-bottom: 28px;
  }

  .result-quote {
    background: var(--gray-1);
    border-radius: 14px;
    padding: 18px 20px;
    margin: 0 24px 20px;
    font-size: 14px;
    line-height: 1.7;
    color: var(--black);
    position: relative;
  }

  .result-quote::before {
    content: '"';
    font-size: 36px;
    color: var(--gray-2);
    position: absolute;
    top: 8px;
    left: 14px;
    line-height: 1;
    font-family: Georgia, serif;
  }

  .result-quote p {
    padding-left: 6px;
  }

  /* 特征标签 */
  .traits {
    padding: 0 24px 20px;
  }

  .traits-title {
    font-size: 12px;
    color: var(--gray-3);
    font-weight: 600;
    margin-bottom: 12px;
    letter-spacing: 0.5px;
  }

  .trait-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .trait {
    background: var(--gray-1);
    border-radius: 20px;
    padding: 8px 14px;
    font-size: 13px;
    color: var(--black);
    font-weight: 500;
  }

  /* 描述段落 */
  .result-desc {
    padding: 0 24px 24px;
    font-size: 14px;
    line-height: 1.8;
    color: #444;
  }

  /* 分隔线 */
  .divider {
    height: 1px;
    background: var(--gray-2);
    margin: 4px 24px 20px;
  }

  /* 按钮组 */
  .result-actions {
    padding: 0 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .btn-share {
    width: 100%;
    height: 52px;
    background: var(--black);
    color: var(--white);
    border: none;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 600;
    font-family: var(--font);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .btn-retry {
    width: 100%;
    height: 52px;
    background: var(--white);
    color: var(--black);
    border: 1.5px solid var(--gray-2);
    border-radius: 14px;
    font-size: 15px;
    font-weight: 600;
    font-family: var(--font);
    cursor: pointer;
  }

  .btn-share:active, .btn-retry:active { opacity: 0.7; }

  /* ─── 像素狗 SVG helpers ─── */
  svg { image-rendering: pixelated; display: block; }

  /* 像素化渲染 */
  canvas { image-rendering: pixelated; }

  /* ─── 封面页新增样式 ─── */
  .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
  .hide-scroll::-webkit-scrollbar { display: none; }

  .btn-pixel { border: 4px solid #000; box-shadow: 6px 6px 0px #000; transition: all 0.1s ease; }
  .btn-pixel:active { transform: translate(4px, 4px); box-shadow: 2px 2px 0px #000; }

  .float-anim { animation: float 4s ease-in-out infinite; }
  .float-anim-reverse { animation: float 4s ease-in-out infinite reverse; }

  @keyframes float {
    0%   { transform: translateY(0px) rotate(0deg); }
    50%  { transform: translateY(-12px) rotate(2deg); }
    100% { transform: translateY(0px) rotate(0deg); }
  }
</style>
</head>

// ──────────────────────────────────────────────
// 状态
// ──────────────────────────────────────────────
let currentQ = 0;
let answers = [];
let selectedOpt = null;

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function startQuiz() {
  currentQ = 0;
  answers = [];
  renderQuestion();
  showPage('page-quiz');
}

// 16只狗的题目页小像素画（显示在56×56框内，使用本地PNG）

// 记录上一次显示的狗索引，避免连续重复
let lastQuizDogIdx = -1;

function renderQuestion() {
  const q = questions[currentQ];
  selectedOpt = null;

  document.getElementById('quiz-counter').textContent = `${currentQ + 1} / ${questions.length}`;
  document.getElementById('progress-fill').style.width = `${((currentQ) / questions.length) * 100}%`;
  document.getElementById('question-text').textContent = q.text;
  document.getElementById('quiz-dog-bubble').textContent = q.hint;

  // 随机切换题目页小像素狗（不重复上一只）
  let idx;
  do { idx = Math.floor(Math.random() * quizDogPixels.length); } while (idx === lastQuizDogIdx && quizDogPixels.length > 1);
  lastQuizDogIdx = idx;
  document.getElementById('quiz-dog-icon').innerHTML = quizDogPixels[idx];

  const wrap = document.getElementById('options-wrap');
  wrap.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="opt-key">${opt.key}</span><span>${opt.text}</span>`;
    btn.onclick = () => selectOption(i, btn);
    wrap.appendChild(btn);
  });

  const nextBtn = document.getElementById('btn-next');
  nextBtn.classList.remove('enabled');
  nextBtn.textContent = currentQ === questions.length - 1 ? '查看结果 →' : '继续 →';
}

function selectOption(idx, el) {
  document.querySelectorAll('.opt').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  selectedOpt = idx;
  document.getElementById('btn-next').classList.add('enabled');
}

function nextQuestion() {
  if (selectedOpt === null) return;
  answers.push(questions[currentQ].options[selectedOpt].dim);

  if (currentQ < questions.length - 1) {
    currentQ++;
    renderQuestion();
  } else {
    showResult();
  }
}

function goBack() {
  if (currentQ === 0) {
    showPage('page-home');
  } else {
    currentQ--;
    answers.pop();
    renderQuestion();
  }
}

// ──────────────────────────────────────────────
// 结果计算（4维度 → 16种结果）
// ──────────────────────────────────────────────
function calcResult() {
  const count = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 };
  answers.forEach(d => { if (count[d] !== undefined) count[d]++; });

  const e = count.E >= count.I ? "E" : "I";
  const s = count.S >= count.N ? "S" : "N";
  const t = count.T >= count.F ? "T" : "F";
  const j = count.J >= count.P ? "J" : "P";
  const type = e + s + t + j;

  const typeMap = {
    "ENTJ": "气场先到三步的杜宾",
    "ENTP": "把所有人都绕晕了的边牧",
    "ENFJ": "比你更担心你的金毛",
    "ENFP": "什么都想闻一口的比格",
    "ESTJ": "把所有人都管住了的德牧",
    "ESTP": "说好散步结果跑丢的哈士奇",
    "ESFJ": "拒绝不了任何人的拉布拉多",
    "ESFP": "出门必须好看的泰迪",
    "INTJ": "假装冷静的柴犬",
    "INTP": "想到一半就忘了的阿拉斯加",
    "INFJ": "永远在笑但只有自己知道为什么的萨摩耶",
    "INFP": "你不懂的马尔济斯",
    "ISTJ": "没做完不能睡觉的柯基",
    "ISTP": "不需要你担心的松狮",
    "ISFJ": "记住你不喜欢香菜的比熊",
    "ISFP": "急不起来的腊肠"
  };
  return typeMap[type] || "假装冷静的柴犬";
}

function formatDogName(name) {
  const breeds = ['拉布拉多','马尔济斯','阿拉斯加','哈士奇','萨摩耶','杜宾','边牧','金毛','比格','德牧','泰迪','柴犬','柯基','松狮','比熊','腊肠'];
  for (const breed of breeds) {
    if (name.endsWith(breed)) {
      const prefix = name.slice(0, name.length - breed.length);
      return prefix + '<br>' + breed;
    }
  }
  return name;
}

function showResult() {
  const typeName = calcResult();
  const data = results[typeName];

  document.getElementById('result-type').innerHTML = formatDogName(typeName);
  document.getElementById('result-subname').textContent = data.subname;
  document.getElementById('result-quote-text').textContent = data.quote;
  document.getElementById('result-desc').textContent = data.desc;

  const now = new Date();
  document.getElementById('result-date').textContent =
    `${now.getMonth()+1}月${now.getDate()}日`;

  const traitList = document.getElementById('trait-list');
  traitList.innerHTML = '';
  data.traits.forEach(t => {
    const span = document.createElement('span');
    span.className = 'trait';
    span.textContent = t;
    traitList.appendChild(span);
  });

  const frame = document.getElementById('result-dog-frame');
  frame.innerHTML = dogSVGs[data.dog] || dogSVGs.philosopher;

  showPage('page-result');
}

function shareResult() {
  const type = document.getElementById('result-type').textContent;
  if (navigator.share) {
    navigator.share({
      title: 'DogTI 测试结果',
      text: `我在 DogTI 测出来是「${type}」，你是什么狗？`,
      url: window.location.href
    });
  } else {
    alert(`我是「${type}」！\n你也来测测？`);
  }
}

function retryQuiz() {
  startQuiz();
}
