<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DogTI - Style B: 可爱像素卡片风</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; image-rendering: pixelated; }

  body {
    background: #fff8e7;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    padding: 24px 16px;
    overflow-x: hidden;
  }

  /* 背景图案 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(#e8d5b0 1px, transparent 1px),
      linear-gradient(90deg, #e8d5b0 1px, transparent 1px);
    background-size: 24px 24px;
    opacity: 0.4;
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 380px;
    max-width: 95vw;
  }

  /* 顶部状态栏 */
  .status-bar {
    background: #3d2b1f;
    color: #ffd700;
    font-size: 6px;
    padding: 6px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 3px solid #1a0f00;
    margin-bottom: 0;
  }

  .hp-bar {
    display: flex;
    gap: 2px;
    align-items: center;
  }

  .hp-heart { color: #ff4757; font-size: 8px; }
  .hp-heart.empty { color: #555; }

  /* 主卡片 */
  .main-card {
    background: #fffef5;
    border: 4px solid #3d2b1f;
    box-shadow: 6px 6px 0 #3d2b1f;
  }

  /* 头部装饰带 */
  .card-header-stripe {
    background: #ff8c42;
    border-bottom: 3px solid #3d2b1f;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  /* 像素狗头像框 */
  .avatar-frame {
    width: 56px;
    height: 56px;
    background: #fff8e7;
    border: 3px solid #3d2b1f;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .avatar-frame::after {
    content: '★';
    position: absolute;
    top: -8px;
    right: -8px;
    background: #ffd700;
    border: 2px solid #3d2b1f;
    width: 16px;
    height: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 6px;
    color: #3d2b1f;
    line-height: 14px;
    text-align: center;
  }

  .title-area {
    flex: 1;
  }

  .product-name {
    color: #fff8e7;
    font-size: 20px;
    letter-spacing: 2px;
    text-shadow: 2px 2px 0 #3d2b1f;
    margin-bottom: 4px;
  }

  .product-tagline {
    color: #fff8e7;
    font-size: 5px;
    opacity: 0.9;
    line-height: 1.6;
  }

  /* 卡片内容 */
  .card-body {
    padding: 16px;
  }

  /* 进度胶囊 */
  .progress-pills {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .pill {
    width: 28px;
    height: 12px;
    border: 2px solid #3d2b1f;
    background: #e8d5b0;
  }

  .pill.done { background: #ff8c42; }
  .pill.current { background: #ffd700; animation: blink-pill 0.8s infinite; }

  @keyframes blink-pill {
    0%, 100% { background: #ffd700; }
    50% { background: #ffec80; }
  }

  /* 问题气泡 */
  .question-bubble {
    background: #fff8e7;
    border: 3px solid #3d2b1f;
    padding: 14px;
    margin-bottom: 14px;
    position: relative;
  }

  .question-bubble::before {
    content: 'Q.03';
    position: absolute;
    top: -12px;
    left: 10px;
    background: #ff8c42;
    border: 2px solid #3d2b1f;
    color: #fff8e7;
    font-size: 6px;
    padding: 2px 6px;
  }

  /* 狗狗提示角色 */
  .dog-hint {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    margin-bottom: 14px;
  }

  .dog-mini {
    flex-shrink: 0;
    width: 40px;
    height: 40px;
  }

  .speech-bubble {
    background: #e8f4ff;
    border: 2px solid #3d2b1f;
    padding: 8px;
    font-size: 6px;
    color: #3d2b1f;
    line-height: 1.8;
    flex: 1;
    position: relative;
  }

  .speech-bubble::before {
    content: '';
    position: absolute;
    left: -8px;
    top: 10px;
    border-right: 8px solid #3d2b1f;
    border-top: 6px solid transparent;
    border-bottom: 6px solid transparent;
  }

  .speech-bubble::after {
    content: '';
    position: absolute;
    left: -5px;
    top: 11px;
    border-right: 6px solid #e8f4ff;
    border-top: 5px solid transparent;
    border-bottom: 5px solid transparent;
  }

  .q-text {
    font-size: 7px;
    color: #3d2b1f;
    line-height: 1.8;
  }

  /* 选项卡片 */
  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }

  .opt-card {
    background: #fff8e7;
    border: 2px solid #3d2b1f;
    padding: 10px 8px;
    cursor: pointer;
    transition: all 0.1s;
    position: relative;
  }

  .opt-label {
    color: #ff8c42;
    font-size: 5px;
    margin-bottom: 4px;
  }

  .opt-text {
    color: #3d2b1f;
    font-size: 5.5px;
    line-height: 1.7;
  }

  .opt-card:hover {
    background: #fff3d0;
    box-shadow: 3px 3px 0 #3d2b1f;
    transform: translate(-2px, -2px);
  }

  .opt-card.selected {
    background: #ffd700;
    border-color: #ff8c42;
    box-shadow: 4px 4px 0 #3d2b1f;
    transform: translate(-2px, -2px);
  }

  .opt-card.selected .opt-label { color: #3d2b1f; }

  /* 选中标记 */
  .check-mark {
    display: none;
    position: absolute;
    top: -6px;
    right: -6px;
    width: 14px;
    height: 14px;
    background: #ff4757;
    border: 2px solid #3d2b1f;
    color: #fff;
    font-size: 6px;
    align-items: center;
    justify-content: center;
  }

  .opt-card.selected .check-mark { display: flex; }

  /* 底部按钮 */
  .bottom-bar {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 6px;
    padding: 10px 14px;
    border: 2px solid #3d2b1f;
    cursor: pointer;
    transition: all 0.1s;
  }

  .btn:hover {
    transform: translate(-2px, -2px);
  }

  .btn:active {
    transform: translate(1px, 1px);
    box-shadow: none !important;
  }

  .btn-back {
    background: #e8d5b0;
    color: #3d2b1f;
    box-shadow: 3px 3px 0 #3d2b1f;
  }

  .btn-next {
    background: #ff8c42;
    color: #fff8e7;
    box-shadow: 3px 3px 0 #3d2b1f;
  }

  /* 装饰角 */
  .corner-deco {
    background: #ff8c42;
    width: 16px;
    height: 16px;
    position: absolute;
  }

  /* 结果预览卡 */
  .result-preview {
    margin-top: 16px;
    background: #fff8e7;
    border: 4px solid #3d2b1f;
    box-shadow: 6px 6px 0 #3d2b1f;
    overflow: hidden;
  }

  .result-header {
    background: #6c63ff;
    border-bottom: 3px solid #3d2b1f;
    padding: 10px 14px;
    color: #fff;
    font-size: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .result-type {
    color: #ffd700;
    font-size: 18px;
    text-shadow: 2px 2px 0 #3a3280;
  }

  .result-body {
    padding: 14px;
  }

  .result-name {
    color: #ff8c42;
    font-size: 10px;
    margin-bottom: 8px;
    text-shadow: 1px 1px 0 #e8d5b0;
  }

  .result-desc {
    color: #3d2b1f;
    font-size: 5.5px;
    line-height: 2;
    margin-bottom: 10px;
  }

  .result-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .tag {
    background: #e8f4ff;
    border: 2px solid #6c63ff;
    color: #6c63ff;
    font-size: 5px;
    padding: 3px 6px;
  }

  .tag.red { background: #ffe8ec; border-color: #ff4757; color: #ff4757; }
  .tag.yellow { background: #fff8e0; border-color: #ffa502; color: #7a4f00; }

  .share-btn {
    width: 100%;
    margin-top: 12px;
    background: #ff6b9d;
    color: #fff;
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    padding: 12px;
    border: 2px solid #3d2b1f;
    box-shadow: 4px 4px 0 #3d2b1f;
    cursor: pointer;
    letter-spacing: 2px;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-4px); }
  }

  .float { animation: float 2s ease-in-out infinite; }
</style>
</head>
<body>

<div class="container">

  <!-- 状态栏 -->
  <div class="status-bar">
    <span>DOGTI v1.0</span>
    <div class="hp-bar">
      <span style="margin-right:4px">脑细胞</span>
      <span class="hp-heart">♥</span>
      <span class="hp-heart">♥</span>
      <span class="hp-heart empty">♥</span>
    </div>
    <span>BGM: ON</span>
  </div>

  <!-- 主卡片 -->
  <div class="main-card">
    <div class="card-header-stripe">
      <div class="avatar-frame">
        <!-- 像素柴犬 -->
        <svg class="float" width="44" height="44" viewBox="0 0 14 14">
          <rect x="5" y="1" width="4" height="2" fill="#c47a2a"/>
          <rect x="4" y="2" width="6" height="3" fill="#d4923a"/>
          <rect x="3" y="3" width="8" height="4" fill="#e8b060"/>
          <rect x="4" y="4" width="6" height="2" fill="#f5d090"/>
          <rect x="3" y="2" width="2" height="2" fill="#8b5e1a"/>
          <rect x="9" y="2" width="2" height="2" fill="#8b5e1a"/>
          <rect x="5" y="4" width="1" height="1" fill="#1a1a1a"/>
          <rect x="8" y="4" width="1" height="1" fill="#1a1a1a"/>
          <rect x="6" y="5" width="2" height="1" fill="#5c3010"/>
          <rect x="4" y="7" width="6" height="5" fill="#d4923a"/>
          <rect x="5" y="7" width="4" height="4" fill="#e8b060"/>
          <rect x="4" y="12" width="2" height="2" fill="#c47a2a"/>
          <rect x="8" y="12" width="2" height="2" fill="#c47a2a"/>
          <rect x="10" y="7" width="2" height="2" fill="#c47a2a"/>
          <rect x="11" y="5" width="2" height="3" fill="#c47a2a"/>
          <!-- 腮红 -->
          <rect x="4" y="6" width="1" height="1" fill="#ffb6b6" opacity="0.7"/>
          <rect x="9" y="6" width="1" height="1" fill="#ffb6b6" opacity="0.7"/>
        </svg>
      </div>
      <div class="title-area">
        <div class="product-name">DOG<span style="color:#ffd700">TI</span></div>
        <div class="product-tagline">你是哪种离谱的狗？<br>做完才敢说你认识自己</div>
      </div>
    </div>

    <div class="card-body">

      <!-- 进度条 -->
      <div class="progress-pills">
        <div class="pill done"></div>
        <div class="pill done"></div>
        <div class="pill current"></div>
        <div class="pill"></div>
        <div class="pill"></div>
        <div class="pill"></div>
        <div class="pill"></div>
        <div class="pill"></div>
        <div class="pill"></div>
        <div class="pill"></div>
        <span style="font-size:5px; color:#8b7355; margin-left:4px;">3/10</span>
      </div>

      <!-- 狗狗提示 -->
      <div class="dog-hint">
        <svg class="dog-mini" width="40" height="40" viewBox="0 0 10 10">
          <rect x="3" y="0" width="4" height="2" fill="#6c63ff"/>
          <rect x="2" y="1" width="6" height="4" fill="#8b84ff"/>
          <rect x="2" y="1" width="2" height="2" fill="#6c63ff"/>
          <rect x="6" y="1" width="2" height="2" fill="#6c63ff"/>
          <rect x="3" y="3" width="1" height="1" fill="#1a1a1a"/>
          <rect x="6" y="3" width="1" height="1" fill="#1a1a1a"/>
          <rect x="4" y="4" width="2" height="1" fill="#4a3a8a"/>
          <rect x="2" y="5" width="6" height="4" fill="#8b84ff"/>
          <rect x="3" y="5" width="4" height="3" fill="#a09bff"/>
          <rect x="2" y="9" width="2" height="1" fill="#6c63ff"/>
          <rect x="6" y="9" width="2" height="1" fill="#6c63ff"/>
          <rect x="8" y="5" width="1" height="2" fill="#6c63ff"/>
          <rect x="9" y="4" width="1" height="2" fill="#6c63ff"/>
        </svg>
        <div class="speech-bubble">
          第3题了！选你最<span style="color:#ff8c42">真实</span>的<br>反应，别骗我，我能看出来
        </div>
      </div>

      <!-- 问题 -->
      <div class="question-bubble">
        <div class="q-text">
          朋友圈出现了你不认识的陌生人，<br>
          你的第一反应是...？
        </div>
      </div>

      <!-- 选项 -->
      <div class="options-grid">
        <div class="opt-card">
          <div class="check-mark">✓</div>
          <div class="opt-label">选项 A</div>
          <div class="opt-text">疯狂翻主页然后截图分享给好友</div>
        </div>
        <div class="opt-card selected">
          <div class="check-mark">✓</div>
          <div class="opt-label">选项 B</div>
          <div class="opt-text">点个赞，表示本狗已阅</div>
        </div>
        <div class="opt-card">
          <div class="check-mark">✓</div>
          <div class="opt-label">选项 C</div>
          <div class="opt-text">屏蔽。不认识的人不配进视野</div>
        </div>
        <div class="opt-card">
          <div class="check-mark">✓</div>
          <div class="opt-label">选项 D</div>
          <div class="opt-text">划过去，我今天已经很累了</div>
        </div>
      </div>

      <!-- 按钮 -->
      <div class="bottom-bar">
        <button class="btn btn-back">◀ 返回</button>
        <button class="btn btn-next">继续 ▶</button>
      </div>

    </div>
  </div>

  <!-- 结果预览 -->
  <div class="result-preview" style="margin-top:20px;">
    <div class="result-header">
      <span>✦ 结果预览 · RESULT CARD ✦</span>
    </div>
    <div style="padding:14px; background:#fffef5;">
      <div style="display:flex; gap:12px; align-items:center; margin-bottom:12px;">
        <svg width="64" height="64" viewBox="0 0 16 16" class="float">
          <!-- 哲学柴犬 -->
          <rect x="6" y="1" width="4" height="2" fill="#c47a2a"/>
          <rect x="5" y="2" width="6" height="3" fill="#d4923a"/>
          <rect x="4" y="3" width="8" height="4" fill="#e8b060"/>
          <rect x="5" y="4" width="6" height="2" fill="#f5d090"/>
          <rect x="4" y="2" width="2" height="2" fill="#8b5e1a"/>
          <rect x="10" y="2" width="2" height="2" fill="#8b5e1a"/>
          <!-- 眼镜 -->
          <rect x="5" y="4" width="2" height="1" fill="#3d2b1f" opacity="0.5"/>
          <rect x="9" y="4" width="2" height="1" fill="#3d2b1f" opacity="0.5"/>
          <rect x="7" y="4" width="2" height="0.5" fill="#3d2b1f" opacity="0.5"/>
          <!-- 眼睛 -->
          <rect x="6" y="4" width="1" height="1" fill="#6c63ff"/>
          <rect x="9" y="4" width="1" height="1" fill="#6c63ff"/>
          <rect x="7" y="6" width="2" height="1" fill="#1a1a1a"/>
          <rect x="5" y="7" width="6" height="5" fill="#c47a2a"/>
          <rect x="6" y="7" width="4" height="4" fill="#e8b060"/>
          <rect x="5" y="12" width="2" height="3" fill="#c47a2a"/>
          <rect x="9" y="12" width="2" height="3" fill="#c47a2a"/>
          <!-- 小书 -->
          <rect x="2" y="8" width="3" height="4" fill="#6c63ff"/>
          <rect x="2" y="8" width="0.5" height="4" fill="#3a3280"/>
        </svg>
        <div>
          <div style="color:#6c63ff; font-size:7px; margin-bottom:4px;">你的狗型是</div>
          <div style="color:#3d2b1f; font-size:14px; text-shadow: 2px 2px 0 #e8d5b0;">哲学柴犬</div>
        </div>
      </div>
      <div style="color:#3d2b1f; font-size:5.5px; line-height:2.2; margin-bottom:10px; background:#fff8e7; border-left:3px solid #ffd700; padding:8px;">
        "我不是孤僻，我是在进行<br>深度的自我审视。"<br>
        —— 你每次一个人待着时的内心旁白
      </div>
      <div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px;">
        <span style="background:#e8f4ff;border:2px solid #6c63ff;color:#6c63ff;font-size:5px;padding:3px 6px;">独行侠</span>
        <span style="background:#fff8e0;border:2px solid #ffa502;color:#7a4f00;font-size:5px;padding:3px 6px;">事后诸葛</span>
        <span style="background:#ffe8ec;border:2px solid #ff4757;color:#ff4757;font-size:5px;padding:3px 6px;">嘴强王者</span>
      </div>
      <button style="width:100%;background:#ff6b9d;color:#fff;font-family:'Press Start 2P',monospace;font-size:6px;padding:12px;border:2px solid #3d2b1f;box-shadow:4px 4px 0 #3d2b1f;cursor:pointer;letter-spacing:1px;">
        ♡ 分享给朋友看看 ♡
      </button>
    </div>
  </div>

</div>

</body>
</html>
